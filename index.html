<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Cordelia - 통합 관리 시스템</title>
    <style>
        :root {
            /* 칠흑 현상 해결을 위한 고대비 다크모드 색상 재정의 */
            --bg-main: #0b0f19;          /* 깊은 밤하늘색 배경 */
            --card-bg: #1f2937;          /* 뚜렷하게 분리되는 카드/로그인 창 배경 */
            --text-dark: #f3f4f6;        /* 밝은 텍스트 */
            --text-muted: #9ca3af;
            --border-color: #374151;
            --accent-green: #84cc16;
            --accent-green-hover: #a3e635;
            --accent-red: #ef4444;
            --status-bg-green: #064e3b;
            --status-text-green: #34d399;
            --panel-header-bg: #111827;
            --input-bg: #111827;         /* 입력창 배경 */
        }

        /* 라이트모드 변수 */
        [data-theme="light"] {
            --bg-main: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #222222;
            --text-muted: #777777;
            --border-color: #e5e7eb;
            --accent-green: #656d4a; 
            --accent-green-hover: #4f5539;
            --accent-red: #b91c1c;
            --status-bg-green: #f0fdf4;
            --status-text-green: #16a34a;
            --panel-header-bg: #f9fafb;
            --input-bg: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            padding: 12px;
            min-height: 100vh;
            transition: background-color 0.2s, color 0.2s;
        }
        @media (min-width: 768px) { body { padding: 24px; } }

        /* 배경과 100% 분리되도록 개선된 로그인 컨테이너 */
        .gateway-container {
            max-width: 360px;
            margin: 40px auto;
            background-color: var(--card-bg) !important; /* 강제 고정 */
            padding: 28px 24px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
            text-align: center;
            border: 2px solid var(--border-color); /* 테두리를 조금 더 두껍게 해서 가시성 확보 */
        }

        .gateway-header h1 { font-size: 22px; margin-bottom: 6px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-dark); }
        .gateway-header p { font-size: 12px; color: var(--text-muted); margin-bottom: 22px; }

        .mode-btn-group { display: flex; gap: 8px; margin-bottom: 18px; }
        .mode-btn {
            flex: 1; padding: 12px 6px; border: 1px solid var(--border-color);
            background-color: var(--input-bg); color: var(--text-dark); border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 13px; transition: all 0.2s;
        }
        .mode-btn.active-op { background: var(--accent-green) !important; color: #000000 !important; border-color: var(--accent-green); }
        [data-theme="light"] .mode-btn.active-op { color: #ffffff !important; }
        .mode-btn.active-admin { background: var(--accent-red) !important; color: white !important; border-color: var(--accent-red); }

        .pin-box input {
            width: 100%; padding: 14px; border: 1px solid var(--border-color);
            border-radius: 8px; text-align: center; font-size: 18px;
            letter-spacing: 4px; margin-bottom: 14px; background-color: var(--input-bg); color: var(--text-dark);
        }
        .error-msg { color: #f87171; font-size: 12px; margin-bottom: 12px; display: none; font-weight: bold; }
        
        .bypass-btn {
            background: none; border: none; color: var(--text-muted); font-size: 12px;
            text-decoration: underline; cursor: pointer; margin-top: 14px;
            display: inline-block; width: 100%;
        }

        /* 메인 대시보드 구조 */
        .app-container { display: none; max-width: 1400px; margin: 0 auto; }
        
        .app-top-bar {
            display: flex; flex-direction: column; gap: 12px;
            background: var(--card-bg); padding: 16px; border-radius: 12px;
            margin-bottom: 16px; border: 1px solid var(--border-color);
        }
        @media (min-width: 768px) {
            .app-top-bar { flex-direction: row; justify-content: space-between; align-items: center; }
        }
        
        .brand-title h2 { font-size: 18px; font-weight: 700; }
        .brand-title p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        
        .top-bar-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; width: 100%; justify-content: space-between; }
        @media (min-width: 768px) { .top-bar-actions { width: auto; justify-content: flex-end; } }
