<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Cordelia - 통합 관리 시스템</title>
    <style>
        :root {
            /* 기본 다크모드 변수 전면 배치 */
            --bg-main: #111827;
            --card-bg: #1f2937;
            --text-dark: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --accent-green: #84cc16;
            --accent-green-hover: #a3e635;
            --accent-red: #b91c1c;
            --status-bg-green: #064e3b;
            --status-text-green: #34d399;
            --panel-header-bg: #111827;
        }

        /* 라이트모드 변수 전환용 구조 정의 */
        [data-theme="light"] {
            --bg-main: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #222222;
            --text-muted: #777777;
            --border-color: #e5e7eb;
            --accent-green: #656d4a; 
            --accent-green-hover: #4f5539;
            --accent-red: #b91c1c;
            --status-bg-green: #f0fdf4;
            --status-text-green: #16a34a;
            --panel-header-bg: #f9fafb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            padding: 12px;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }
        @media (min-width: 768px) { body { padding: 24px; } }

        /* 모바일 스크린샷 짤림 현상 완치용 게이트웨이 박스 고도화 */
        .gateway-container {
            max-width: 380px;
            margin: 30px auto; /* 마진을 줄여 화면 위쪽으로 바짝 정렬 */
            background: var(--card-bg);
            padding: 24px 20px; /* 패딩을 압축하여 모바일 짤림 원천 차단 */
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .gateway-header h1 { font-size: 20px; margin-bottom: 4px; letter-spacing: -0.5px; }
        .gateway-header p { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; }

        .mode-btn-group { display: flex; gap: 8px; margin-bottom: 16px; }
        .mode-btn {
            flex: 1; padding: 12px 6px; border: 1px solid var(--border-color);
            background: var(--bg-main); color: var(--text-dark); border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 13px; transition: all 0.2s;
        }
        .mode-btn.active-op { background: var(--accent-green); color: #000; border-color: var(--accent-green); }
        [data-theme="light"] .mode-btn.active-op { color: #fff; }
        .mode-btn.active-admin { background: var(--accent-red); color: white; border-color: var(--accent-red); }

        .pin-box input {
            width: 100%; padding: 12px; border: 1px solid var(--border-color);
            border-radius: 8px; text-align: center; font-size: 16px;
            letter-spacing: 4px; margin-bottom: 12px; background: var(--bg-main); color: var(--text-dark);
        }
        .error-msg { color: #f87171; font-size: 12px; margin-bottom: 12px; display: none; }
        
        .bypass-btn {
            background: none; border: none; color: var(--text-muted); font-size: 11px;
            text-decoration: underline; cursor: pointer; margin-top: 12px;
            display: inline-block; width: 100%;
        }

        /* 메인 레이아웃 및 상단 탑 바 */
        .app-container { display: none; max-width: 1400px; margin: 0 auto; }
        
        .app-top-bar {
            display: flex; flex-direction: column; gap: 12px;
            background: var(--card-bg); padding: 16px; border-radius: 12px;
            margin-bottom: 16px; border: 1px solid var(--border-color);
        }
        @media (min-width: 768px) {
            .app-top-bar { flex-direction: row; justify-content: space-between; align-items: center; }
        }
        
        .brand-title h2 { font-size: 18px; font-weight: 700; }
        .brand-title p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        
        .top-bar-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; width: 100%; justify-content: space-between; }
        @media (min-width: 768px) { .top-bar-actions { width: auto; justify-content: flex-end; } }
        
        .top-btn {
            padding: 10px 14px; border: 1px solid var(--border-color);
            background: var(--card-bg); color: var(--text-dark); border-radius: 6px; font-size: 13px; font-weight: 500;
            cursor: pointer; flex: 1; text-align: center;
        }
        @media (min-width: 768px) { .top-btn { flex: none; } }
        .top-btn:hover { background: #374151; }
        [data-theme="light"] .top-btn:hover { background: #e5e7eb; }

        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; display: inline-block; text-align: center; }
        .badge-op { background-color: var(--accent-green); color: #000; }
        [data-theme="light"] .badge-op { color: #fff; }
        .badge-admin { background-color: var(--accent-red); }

        .theme-switch-btn { background: #374151; color: #fbbf24; font-weight: bold; }
        [data-theme="light"] .theme-switch-btn { background: #e5e7eb; color: #374151; }

        /* 지표 요약 카드 레이아웃 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px; margin-bottom: 16px;
        }
        @media (min-width: 900px) {
            .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
        }
        
        .stats-card {
            background: var(--card-bg); padding: 14px; border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .stats-card .stats-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
        .stats-card .stats-value { font-size: 20px; font-weight: 800; margin: 4px 0; }
        @media (min-width: 768px) { .stats-card .stats-value { font-size: 26px; } }
        .stats-card .stats-desc { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 반응형 1줄 통합 구조 패치 */
        .dashboard-body-layout { display: flex; flex-direction: column; gap: 16px; width: 100%; }
        @media (min-width: 1100px) { .dashboard-body-layout { display: grid; grid-template-columns: 1fr 380px; gap: 16px; } }

        .left-main-stream { display: flex; flex-direction: column; gap: 16px; width: 100%; }
        .right-control-sidebar { display: flex; flex-direction: column; gap: 16px; width: 100%; }

        .panel-container {
            background: var(--card-bg); padding: 16px; border-radius: 12px;
            border: 1px solid var(--border-color); width: 100%;
        }
        @media (min-width: 768px) { .panel-container { padding: 24px; } }

        .panel-header-title {
            font-size: 15px; font-weight: 700; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* 객실 카드 그리드 균형 패치 */
        .room-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; }
        @media (min-width: 550px) { .room-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; } }
        @media (min-width: 768px) { .room-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; } }
        
        .room-card {
            border: 1px solid var(--border-color); border-radius: 12px;
            padding: 14px; background: var(--card-bg); cursor: pointer;
            transition: all 0.2s; position: relative; width: 100%;
        }
        .room-card:hover, .room-card.selected { border-color: var(--accent-green); box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
        .room-card.selected { border-width: 2px; }
        .admin-view .room-card:hover, .admin-view .room-card.selected { border-color: var(--accent-red); }

        .room-card .room-title-num { font-size: 18px; font-weight: 800; }
        @media (min-width: 768px) { .room-card .room-title-num { font-size: 22px; } }

        .room-card .status-tag {
            position: absolute; top: 14px; right: 14px; font-size: 10px;
            padding: 2px 6px; border-radius: 4px; background: #374151; color: #ccc; font-weight: 600;
        }
        [data-theme="light"] .room-card .status-tag { background: #f3f4f6; color: #555; }
        
        .room-card.in-use { background: var(--status-bg-green); border-color: #047857; }
        .room-card.in-use .status-tag { background: #16a34a; color: white; }
        
        .room-card.cleaning { background: #451a03; border-color: #78350f; }
        [data-theme="light"] .room-card.cleaning { background: #fffbeb; border-color: #fde68a; }
        .room-card.cleaning .status-tag { background: #d97706; color: white; }

        .room-info-list { font-size: 12px; margin-top: 12px; display: flex; flex-direction: column; gap: 4px; }
        .room-info-list div { display: flex; justify-content: space-between; border-bottom: 1px dashed var(--border-color); padding-bottom: 2px; }
        .room-info-list div span:first-child { color: var(--text-muted); }
        .room-info-list div span:last-child { font-weight: 600; }

        .card-inner-actions { display: flex; gap: 4px; margin-top: 12px; }
        .inner-btn {
            flex: 1; padding: 6px; font-size: 11px; font-weight: 500;
            border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-dark); border-radius: 6px; cursor: pointer;
        }

        /* 테이블 스크롤 바 모바일 패치 */
        .data-table-wrapper { width: 100%; overflow-x: auto; margin-top: 6px; -webkit-overflow-scrolling: touch; }
        .base-data-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; min-width: 550px; }
        .base-data-table th { background: var(--panel-header-bg); padding: 10px; font-weight: 600; border-bottom: 2px solid var(--border-color); color: var(--text-dark); }
        .base-data-table td { padding: 12px 10px; border-bottom: 1px solid var(--border-color); color: var(--text-dark); }
