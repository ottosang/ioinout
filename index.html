<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Cordelia - 통합 관리 시스템</title>
    <script>
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('cordelia_theme', 'dark');
        if (window.location.search.indexOf('v=') === -1) {
            window.location.replace(window.location.origin + window.location.pathname + '?v=' + new Date().getTime());
        }
    </script>
    <style>
        :root { --bg-main: #111827; --card-bg: #1f2937; --text-dark: #f3f4f6; --text-muted: #9ca3af; --border-color: #374151; --accent-green: #84cc16; --accent-red: #ef4444; --status-bg-green: #064e3b; --status-text-green: #34d399; --panel-header-bg: #111827; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); padding: 20px; min-height: 100vh; }
        
        .gateway-container { max-width: 400px; margin: 50px auto; background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); text-align: center; }
        .app-container { display: none; max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        @media (max-width: 1100px) { .app-container { grid-template-columns: 1fr; } }
        
        .room-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .room-card { background: var(--card-bg); padding: 20px; border: 1px solid var(--border-color); border-radius: 12px; cursor: pointer; text-align: center; }
        .room-card.selected { border-color: var(--accent-green); border-width: 2px; }
        
        .sidebar { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #111827; border: 1px solid var(--border-color); color: white; border-radius: 8px; }
        .btn-action { width: 100%; padding: 15px; background: var(--accent-green); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; }
        
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: left; }
    </style>
</head>
<body>

    <div id="gateway-root" class="gateway-container">
        <h2>HOTEL CORDELIA</h2>
        <div style="margin:20px 0;">
            <button onclick="userMode='op'; this.style.background='var(--accent-green)'" style="padding:10px; background:var(--accent-green)">운영</button>
            <button onclick="userMode='admin'; this.style.background='var(--accent-red)'" style="padding:10px; background:#374151">관리자</button>
        </div>
        <input type="password" id="pin" placeholder="PIN 입력 (0220/0880)">
        <button class="btn-action" onclick="login()">접속하기</button>
    </div>

    <div id="dashboard-app-root" class="app-container">
        <div>
            <h2>객실 현황</h2>
            <div class="room-grid" id="room-list"></div>
            <h3>투숙/정산 내역</h3>
            <table><thead><tr><th>객실</th><th>연락처</th><th>상태</th></tr></thead><tbody id="table"></tbody></table>
        </div>
        <div class="sidebar">
            <h3>객실 제어</h3>
            <div id="target">101호 선택됨</div>
            <input type="text" id="phone" placeholder="연락처">
            <button class="btn-action" onclick="checkIn()">입실 처리</button>
        </div>
    </div>

    <script>
        let selected = 101;
        const list = document.getElementById('room-list');
        const table = document.getElementById('table');

        for(let i=101; i<=108; i++) {
            list.innerHTML += `<div class="room-card" onclick="selected=${i}; document.getElementById('target').innerText='${i}호 선택됨'"> ${i}호<br>공실</div>`;
        }

        function login() {
            if(document.getElementById('pin').value === '0220' || document.getElementById('pin').value === '0880') {
                document.getElementById('gateway-root').style.display = 'none';
                document.getElementById('dashboard-app-root').style.display = 'grid';
            } else { alert('비밀번호 오류'); }
        }

        function checkIn() {
            table.innerHTML += `<tr><td>${selected}호</td><td>${document.getElementById('phone').value}</td><td>입실중</td></tr>`;
            alert(selected + '호 입실 처리 완료');
        }
    </script>
</body>
</html>
