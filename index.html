<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Cordelia - 통합 관리 시스템</title>
    <style>
        :root { --bg-main: #f8f9fa; --card-bg: #ffffff; --text-dark: #222222; --text-muted: #777777; --border-color: #e5e7eb; --accent-green: #656d4a; --accent-red: #b91c1c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); padding: 20px; min-height: 100vh; }
        
        .gateway-container { max-width: 400px; margin: 50px auto; background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); text-align: center; }
        .app-container { display: none; max-width: 1400px; margin: 0 auto; grid-template-columns: 1fr 350px; gap: 20px; }
        @media (max-width: 1100px) { .app-container { grid-template-columns: 1fr; } }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stats-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .stats-value { font-size: 24px; font-weight: 800; margin-top: 5px; }
        
        .room-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .room-card { background: var(--card-bg); padding: 20px; border: 1px solid var(--border-color); border-radius: 12px; cursor: pointer; text-align: center; }
        .room-card.selected { border: 2px solid var(--accent-green); }
        
        .sidebar { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border-color); border-radius: 8px; }
        .btn-action { width: 100%; padding: 15px; background: var(--accent-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: left; }
    </style>
</head>
<body>

    <div id="gateway-root" class="gateway-container">
        <h1>HOTEL CORDELIA</h1>
        <div style="margin:20px 0;">
            <button onclick="userMode='op'; this.style.background='var(--accent-green)'" style="padding:10px; background:var(--accent-green)">운영</button>
            <button onclick="userMode='admin'; this.style.background='var(--accent-red)'" style="padding:10px; background:#ddd">관리자</button>
        </div>
        <input type="password" id="pin" placeholder="PIN 입력 (0220/0880)">
        <button class="btn-action" onclick="login()">시스템 접속</button>
    </div>

    <div id="dashboard-app-root" class="app-container">
        <div>
            <div class="stats-grid">
                <div class="stats-card">재실<div class="stats-value">1 실</div></div>
                <div class="stats-card">공실<div class="stats-value">7 실</div></div>
                <div class="stats-card">정비<div class="stats-value">0 실</div></div>
                <div class="stats-card">매출<div class="stats-value">80,000원</div></div>
            </div>
            <h2>객실 현황</h2>
            <div class="room-grid" id="room-list"></div>
            <h3>투숙 및 정산 내역</h3>
            <table><thead><tr><th>객실</th><th>연락처</th><th>상태</th></tr></thead><tbody id="table"></tbody></table>
        </div>
        <div class="sidebar">
            <h3>객실 제어</h3>
            <div id="target" style="font-weight:bold; margin:10px 0;">101호 선택됨</div>
            <input type="text" id="phone" placeholder="연락처">
            <input type="date" id="checkin">
            <button class="btn-action" onclick="checkIn()">입실 처리</button>
        </div>
    </div>

    <script>
        let selected = 101;
        const list = document.getElementById('room-list');
        const table = document.getElementById('table');

        for(let i=101; i<=108; i++) {
            list.innerHTML += `<div class="room-card" onclick="selected=${i}; document.getElementById('target').innerText='${i}호 선택됨'"> ${i}호<br>예약가능</div>`;
        }

        function login() {
            if(document.getElementById('pin').value === '0220' || document.getElementById('pin').value === '0880') {
                document.getElementById('gateway-root').style.display = 'none';
                document.getElementById('dashboard-app-root').style.display = 'grid';
            } else { alert('비밀번호 오류'); }
        }

        function checkIn() {
            let phone = document.getElementById('phone').value;
            table.innerHTML += `<tr><td>${selected}호</td><td>${phone}</td><td>입실중</td></tr>`;
            alert(selected + '호 입실 완료');
        }
    </script>
</body>
</html>
