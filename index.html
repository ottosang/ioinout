<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Cordelia - 통합 관리 시스템</title>
    <style>
        /* 기본 다크 테마 강제 셋업 */
        :root {
            --bg-main: #0b0f19;          
            --card-bg: #1f2937;          
            --text-dark: #ffffff;        
            --text-muted: #9ca3af;       
            --border-color: #374151;     
            --accent-green: #84cc16;     
            --accent-green-hover: #a3e635;
            --accent-red: #ef4444;       
            --status-bg-green: #064e3b;
            --status-text-green: #34d399;
            --panel-header-bg: #111827;
            --input-bg: #111827;         
        }

        body.light-theme-active {
            --bg-main: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #222222;
            --text-muted: #777777;
            --border-color: #e5e7eb;
            --accent-green: #656d4a; 
            --accent-green-hover: #4f5539;
            --accent-red: #b91c1c;
            --status-bg-green: #f0fdf4;
            --status-text-green: #16a34a;
            --panel-header-bg: #f9fafb;
            --input-bg: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main) !important;
            color: var(--text-dark) !important;
            padding: 12px;
            min-height: 100vh;
            transition: background-color 0.1s, color 0.1s;
        }
        @media (min-width: 768px) { body { padding: 24px; } }

        .gateway-container {
            max-width: 350px;
            margin: 50px auto;
            background-color: var(--card-bg) !important;
            padding: 30px 24px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
            border: 2px solid var(--border-color) !important;
            display: block !important;
        }

        .gateway-header h1 { font-size: 22px; margin-bottom: 6px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-dark) !important; }
        .gateway-header p { font-size: 12px; color: var(--text-muted) !important; margin-bottom: 24px; }

        .mode-btn-group { display: flex; gap: 8px; margin-bottom: 18px; }
        .mode-btn {
            flex: 1; padding: 13px 6px; border: 1px solid var(--border-color);
            background-color: var(--input-bg) !important; color: var(--text-dark) !important; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 13px;
        }
        .mode-btn.active-op { background-color: var(--accent-green) !important; color: #000000 !important; border-color: var(--accent-green) !important; }
        .mode-btn.active-admin { background-color: var(--accent-red) !important; color: #ffffff !important; border-color: var(--accent-red) !important; }

        .pin-box input {
            width: 100%; padding: 14px; border: 1px solid var(--border-color);
            border-radius: 8px; text-align: center; font-size: 18px;
            letter-spacing: 4px; margin-bottom: 14px; background-color: var(--input-bg) !important; color: var(--text-dark) !important;
        }
        
        /* 다크모드에서 시각적으로 경고가 뚜렷하게 보이도록 고휘도 네온 레드 패치 */
        .error-msg { 
            color: #ff4d4d !important; 
            background-color: #3a1c1c;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ff3333;
            font-size: 12px; 
            margin-bottom: 14px; 
            display: none; 
            font-weight: bold; 
            line-height: 1.4;
        }
        
        .bypass-btn {
            background: none; border: none; color: var(--text-muted) !important; font-size: 12px;
            text-decoration: underline; cursor: pointer; margin-top: 14px; display: inline-block; width: 100%;
        }

        /* 대시보드 인프라 스타일 */
        .app-container { display: none; max-width: 1400px; margin: 0 auto; }
        
        .app-top-bar {
            display: flex; flex-direction: column; gap: 12px;
            background: var(--card-bg); padding: 16px; border-radius: 12px;
            margin-bottom: 16px; border: 1px solid var(--border-color);
        }
        @media (min-width: 768px) { .app-top-bar { flex-direction: row; justify-content: space-between; align-items: center; } }
        
        .brand-title h2 { font-size: 18px; font-weight: 700; }
        .brand-title p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        
        .top-bar-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; width: 100%; justify-content: space-between; }
        @media (min-width: 768px) { .top-bar-actions { width: auto; justify-content: flex-end; } }
        
        .top-btn {
            padding: 10px 14px; border: 1px solid var(--border-color);
            background: var(--card-bg); color: var(--text-dark); border-radius: 6px; font-size: 13px; font-weight: 500;
            cursor: pointer; flex: 1; text-align: center;
        }
        @media (min-width: 768px) { .top-btn { flex: none; } }

        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; display: inline-block; text-align: center; }
        .badge-op { background-color: var(--accent-green); color: #000; }
        .badge-admin { background-color: var(--accent-red); color: #fff; }

        .theme-switch-btn { background: #374151; color: #fbbf24; font-weight: bold; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
        @media (min-width: 900px) { .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; } }
        
        .stats-card { background: var(--card-bg); padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); }
        .stats-card .stats-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
        .stats-card .stats-value { font-size: 20px; font-weight: 800; margin: 4px 0; }
        @media (min-width: 768px) { .stats-card .stats-value { font-size: 26px; } }
        .stats-card .stats-desc { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .dashboard-body-layout { display: flex; flex-direction: column; gap: 16px; width: 100%; }
        @media (min-width: 1100px) { .dashboard-body-layout { display: grid; grid-template-columns: 1fr 380px; gap: 16px; } }

        .left-main-stream { display: flex; flex-direction: column; gap: 16px; width: 100%; }
        .right-control-sidebar { display: flex; flex-direction: column; gap: 16px; width: 100%; }

        .panel-container { background: var(--card-bg); padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); width: 100%; }
        @media (min-width: 768px) { .panel-container { padding: 24px; } }

        .panel-header-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }

        .room-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; }
        @media (min-width: 550px) { .room-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; } }
        @media (min-width: 768px) { .room-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; } }
        
        .room-card { border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; background: var(--card-bg); cursor: pointer; transition: all 0.2s; position: relative; width: 100%; }
        .room-card:hover, .room-card.selected { border-color: var(--accent-green); box-shadow: 0 4px 14px rgba(0,0,0,0.4); }
        .room-card.selected { border-width: 2px; }

        .room-card .room-title-num { font-size: 18px; font-weight: 800; }
        .room-card .status-tag { position: absolute; top: 14px; right: 14px; font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #374151; color: #ccc; font-weight: 600; }
        
        .room-card.in-use { background: var(--status-bg-green); border-color: #047857; }
        .room-card.in-use .status-tag { background: #16a34a; color: white; }
        
        .room-card.cleaning { background: #451a03; border-color: #78350f; }
        .room-card.cleaning .status-tag { background: #d97706; color: white; }

        .room-info-list { font-size: 12px; margin-top: 12px; display: flex; flex-direction: column; gap: 4px; }
        .room-info-list div { display: flex; justify-content: space-between; border-bottom: 1px dashed var(--border-color); padding-bottom: 2px; }
        .room-info-list div span:first-child { color: var(--text-muted); }
        .room-info-list div span:last-child { font-weight: 600; }

        .card-inner-actions { display: flex; gap: 4px; margin-top: 12px; }
        .inner-btn { flex: 1; padding: 6px; font-size: 11px; font-weight: 500; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-dark); border-radius: 6px; cursor: pointer; }

        .data-table-wrapper { width: 100%; overflow-x: auto; margin-top: 6px; -webkit-overflow-scrolling: touch; }
        .base-data-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; min-width: 550px; }
