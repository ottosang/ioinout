<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Cordelia - 객실 및 시설 통합 관리 시스템</title>
    <style>
        :root {
            --bg-main: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #222222;
            --text-muted: #777777;
            --border-color: #e5e7eb;
            --accent-green: #656d4a; 
            --accent-green-hover: #4f5539;
            --accent-red: #b91c1c;
            --status-bg-green: #f0fdf4;
            --status-text-green: #16a34a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            padding: 24px;
            min-height: 100vh;
        }

        /* [모바일 반응형 추가 레이아웃] */
        @media (max-width: 1100px) {
            .dashboard-body-layout { grid-template-columns: 1fr !important; }
            .app-container { grid-template-columns: 1fr !important; }
        }

        /* 기존의 모든 스타일을 그대로 유지합니다 */
        .gateway-container { max-width: 400px; margin: 100px auto; background: var(--card-bg); padding: 35px 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); text-align: center; border: 1px solid var(--border-color); }
        .gateway-header h1 { font-size: 22px; margin-bottom: 6px; }
        .gateway-header p { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; }
        .mode-btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; border: 1px solid var(--border-color); background: #f9fafb; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .mode-btn.active-op { background: var(--accent-green); color: white; border-color: var(--accent-green); }
        .mode-btn.active-admin { background: var(--accent-red); color: white; border-color: var(--accent-red); }
        .pin-box input { width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 8px; text-align: center; font-size: 18px; letter-spacing: 4px; margin-bottom: 15px; }
        .error-msg { color: var(--accent-red); font-size: 12px; margin-bottom: 15px; display: none; }
        .bypass-btn { background: none; border: none; color: #9ca3af; font-size: 11px; text-decoration: underline; cursor: pointer; margin-top: 12px; display: inline-block; width: 100%; }
        
        .app-container { display: none; max-width: 1400px; margin: 0 auto; }
        .app-top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 18px 24px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .brand-title h2 { font-size: 20px; font-weight: 700; color: #111; }
        .brand-title p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .top-bar-actions { display: flex; align-items: center; gap: 10px; }
        .top-btn { padding: 8px 14px; border: 1px solid var(--border-color); background: #ffffff; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; }
        .badge-op { background-color: var(--accent-green); }
        .badge-admin { background-color: var(--accent-red); }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .stats-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .stats-card .stats-label { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .stats-card .stats-value { font-size: 28px; font-weight: 800; margin: 8px 0 4px 0; }
        .stats-card .stats-desc { font-size: 11px; color: #888; }

        .dashboard-body-layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .panel-container { background: var(--card-bg); padding: 24px; border-radius: 12px; border: 1px solid var(--border-color); }
        .panel-header-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
        .room-card { border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; background: #ffffff; cursor: pointer; transition: all 0.2s; position: relative; }
        .room-card:hover, .room-card.selected { border-color: var(--accent-green); box-shadow: 0 4px 14px rgba(0,0,0,0.04); }
        .room-card .room-title-num { font-size: 22px; font-weight: 800; }
        .room-card .status-tag { position: absolute; top: 20px; right: 20px; font-size: 11px; padding: 3px 8px; border-radius: 6px; background: #f3f4f6; color: #555; font-weight: 600; }
        .room-card.in-use { background: #fafbfa; border-color: #cbd5e1; }
        .room-card.in-use .status-tag { background: var(--accent-green); color: white; }
        .room-card.cleaning { background: #fffbeb; border-color: #fde68a; }
        .room-card.cleaning .status-tag { background: #d97706; color: white; }
        .room-info-list { font-size: 13px; margin-top: 15px; display: flex; flex-direction: column; gap: 4px; }
        .room-info-list div { display: flex; justify-content: space-between; border-bottom: 1px dashed #f3f4f6; padding-bottom: 2px; }
        .room-info-list div span:first-child { color: var(--text-muted); }
        .room-info-list div span:last-child { font-weight: 600; }
        .card-inner-actions { display: flex; gap: 6px; margin-top: 15px; }
        .inner-btn { flex: 1; padding: 6px; font-size: 12px; font-weight: 500; border: 1px solid var(--border-color); background: white; border-radius: 6px; cursor: pointer; }

        .data-table-wrapper { width: 100%; overflow-x: auto; margin-top: 10px; }
        .base-data-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        .base-data-table th { background: #f9fafb; padding: 12px; font-weight: 600; border-bottom: 2px solid #edf2f7; color: #444; }
        .base-data-table td { padding: 14px 12px; border-bottom: 1px solid #edf2f7; color: #333; }
        .table-btn-end { padding: 4px 10px; border: 1px solid #fee2e2; background: #fef2f2; color: var(--accent-red); border-radius: 4px; font-weight: bold; cursor: pointer; }

        .right-control-sidebar { background: var(--card-bg); padding: 24px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 22px; align-self: start; }
        .section-block-title { font-size: 15px; font-weight: 700; padding-bottom: 8px; border-bottom: 2px solid #f3f4f6; }
        .focus-room-title { font-size: 26px; font-weight: 800; color: var(--accent-green); }
        .form-row { margin-bottom: 12px; }
        .form-row label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
        .form-row input, .form-row select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; }
        .pay-method-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 6px; }
        .method-btn { padding: 8px; font-size: 12px; font-weight: bold; border: 1px solid var(--border-color); background: #fff; border-radius: 6px; cursor: pointer; text-align: center; }
        .method-btn.selected { background: #f5f6f2; border-color: var(--accent-green); color: var(--accent-green); }
        .native-cal-box { display: flex; gap: 8px; background: #fff; border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; }
        .native-cal-box input { flex: 1; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px; text-align: center; }
        .total-amount-display-card { background: #fbfbfa; border: 1px solid #e9ebe4; padding: 15px; border-radius: 8px; text-align: center; margin-top: 5px; }
        .total-amount-display-card .amt-label { font-size: 12px; color: var(--text-muted); }
        .total-amount-display-card .amt-val { font-size: 22px; font-weight: 800; color: #111; margin-top: 4px; }
        .submit-large-btn { width: 100%; padding: 15px; background: var(--accent-green); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    </body>
</html>
